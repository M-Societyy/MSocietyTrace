<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSocietyTrace - Logs</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Courier New', monospace;
            background: #000;
            color: #fff;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #8B0000;
            padding-bottom: 20px;
        }
        
        .header h1 {
            color: #8B0000;
            font-size: 2.5em;
            text-shadow: 0 0 10px #8B0000;
        }
        
        .back-btn {
            background: #8B0000;
            color: #fff;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            font-family: 'Courier New', monospace;
            margin-bottom: 20px;
            display: inline-block;
        }
        
        .back-btn:hover {
            background: #A52A2A;
        }
        
        .logs-container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .log-item {
            background: #111;
            border: 1px solid #333;
            border-radius: 5px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .log-info {
            flex: 1;
        }
        
        .log-filename {
            color: #8B0000;
            font-weight: bold;
            font-size: 1.1em;
        }
        
        .log-details {
            color: #666;
            font-size: 0.9em;
            margin-top: 5px;
        }
        
        .log-actions {
            display: flex;
            gap: 10px;
        }
        
        .action-btn {
            background: #333;
            color: #fff;
            border: none;
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
            text-decoration: none;
            font-family: 'Courier New', monospace;
            font-size: 0.8em;
        }
        
        .action-btn:hover {
            background: #555;
        }
        
        .no-logs {
            text-align: center;
            color: #666;
            margin-top: 50px;
        }
        
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: #111;
            border: 1px solid #333;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
        }
        
        .stat-number {
            font-size: 2em;
            color: #8B0000;
            font-weight: bold;
        }
        
        .stat-label {
            color: #666;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>MSocietyTrace Logs</h1>
        <p>Session Data Archives</p>
    </div>
    
    <a href="/dashboard" class="back-btn">← Back to Dashboard</a>
    
    <div class="logs-container">
        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-number" id="total-logs">Loading...</div>
                <div class="stat-label">Total Log Files</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="total-size">Loading...</div>
                <div class="stat-label">Total Size</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="latest-log">Loading...</div>
                <div class="stat-label">Latest Log</div>
            </div>
        </div>
        
        <div id="logs-list">
            <p style="text-align: center; color: #666;">Loading logs...</p>
        </div>
    </div>
    
    <script>
        async function loadLogs() {
            try {
                const response = await fetch('/api/logs');
                const data = await response.json();
                
                const logsList = document.getElementById('logs-list');
                const totalLogs = document.getElementById('total-logs');
                const totalSize = document.getElementById('total-size');
                const latestLog = document.getElementById('latest-log');
                
                if (data.logs && data.logs.length > 0) {
                    // Update stats
                    totalLogs.textContent = data.logs.length;
                    
                    let totalBytes = 0;
                    data.logs.forEach(log => {
                        totalBytes += log.size;
                    });
                    totalSize.textContent = formatBytes(totalBytes);
                    
                    if (data.logs.length > 0) {
                        const latest = new Date(data.logs[0].modified);
                        latestLog.textContent = latest.toLocaleString();
                    }
                    
                    // Render logs
                    logsList.innerHTML = data.logs.map(log => `
                        <div class="log-item">
                            <div class="log-info">
                                <div class="log-filename">${log.filename}</div>
                                <div class="log-details">
                                    Size: ${formatBytes(log.size)} | 
                                    Modified: ${new Date(log.modified).toLocaleString()}
                                </div>
                            </div>
                            <div class="log-actions">
                                <a href="/logs/${log.filename}" class="action-btn" download>Download</a>
                                <button class="action-btn" onclick="viewLog('${log.filename}')">View</button>
                            </div>
                        </div>
                    `).join('');
                } else {
                    logsList.innerHTML = '<div class="no-logs"><h2>No log files found</h2><p>Start capturing targets to generate logs</p></div>';
                    totalLogs.textContent = '0';
                    totalSize.textContent = '0 B';
                    latestLog.textContent = 'N/A';
                }
            } catch (error) {
                document.getElementById('logs-list').innerHTML = '<div class="no-logs"><h2>Error loading logs</h2><p>' + error.message + '</p></div>';
            }
        }
        
        function formatBytes(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }
        
        function viewLog(filename) {
            window.open(`/logs/${filename}`, '_blank');
        }
        
        // Load logs on page load
        loadLogs();
        
        // Auto-refresh every 30 seconds
        setInterval(loadLogs, 30000);
    </script>
</body>
</html>
